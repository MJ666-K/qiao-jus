# 用工风险规则集（占位示例）
# Phase 1 placeholder: 8 common employment compliance rules. Production
# ruleset should be reviewed by a labor lawyer and cover the 15 evaluation
# scenarios referenced in docs/技术架构文档.md §7.3.
ruleset: labor_rules
rules:
  - id: LAB-001
    title: 未依法订立书面劳动合同
    keyword: 未签订
    level: 高
    law_ref: 劳动合同法第10条、第82条
    suggestion: 用工之日起一个月内订立书面劳动合同；超过一个月未订立的，应支付二倍工资。

  - id: LAB-002
    title: 试用期超过法定上限
    pattern: 试用期.{0,4}(超过|长达|一年|二年|六个月以上)
    level: 中
    law_ref: 劳动合同法第19条
    suggestion: 合同期三个月以上不满一年的，试用期不得超过一个月；一年以上不满三年的不超过二个月；三年以上及无固定期限的不超过六个月。

  - id: LAB-003
    title: 试用期工资低于法定下限
    pattern: 试用期.{0,8}(工资|薪资).{0,4}(低于|少于|打折|80%|70%|60%)
    level: 中
    law_ref: 劳动合同法第20条
    suggestion: 试用期工资不得低于本单位相同岗位最低档工资或合同约定工资的 80%，并不得低于当地最低工资。

  - id: LAB-004
    title: 约定违约金条款超出法定情形
    keyword: 违约金
    level: 中
    law_ref: 劳动合同法第25条
    suggestion: 仅可在「专项培训服务期」与「竞业限制」两种情形约定违约金，其他情形约定无效。

  - id: LAB-005
    title: 加班费未依法计算
    pattern: 加班.{0,8}(无|没有|不发|不给|不计).{0,4}(加班费|加班工资|报酬)
    level: 高
    law_ref: 劳动法第44条
    suggestion: 工作日延长工时支付 150% 工资；休息日加班又不能补休的支付 200%；法定休假日支付 300%。

  - id: LAB-006
    title: 拖欠或克扣工资
    pattern: (拖欠|克扣|不发|未发).{0,4}(工资|薪资|报酬|月薪)
    level: 高
    law_ref: 劳动法第50条、劳动合同法第30条、第85条
    suggestion: 工资应以货币形式按月支付，不得克扣或无故拖欠。劳动者可向劳动监察投诉或申请支付令。

  - id: LAB-007
    title: 违法解除劳动合同
    pattern: (解除|辞退|开除|终止).{0,4}(劳动合同|劳动关系).{0,8}(无|未|没有).{0,4}(补偿|赔偿|经济补偿)
    level: 高
    law_ref: 劳动合同法第39-41条、第46-48条、第87条
    suggestion: 不符合法定解除情形的属违法解除，应按经济补偿标准的二倍支付赔偿金。

  - id: LAB-008
    title: 未依法缴纳社会保险
    pattern: (未|没有|不).{0,4}(缴纳|交|办).{0,4}(社保|社会保险|养老保险|工伤保险)
    level: 高
    law_ref: 社会保险法第58条、第84条
    suggestion: 用工之日起三十日内为职工办理社保登记并足额缴纳，未办的由社保行政部门责令限期改正。

  - id: LAB-009
    title: 工伤保险未缴或拒付工伤待遇
    pattern: (未|没有|不).{0,4}(缴|办).{0,4}工伤(保险)?|(拒|不|没有).{0,4}(付|给|报).{0,4}(工伤|医疗费|停工留薪)
    level: 高
    law_ref: 工伤保险条例第62条、社会保险法第41条
    suggestion: 未参保期间职工发生工伤的，所有工伤保险待遇由用人单位承担，不得以任何理由拒付。

  - id: LAB-010
    title: 未依法安排带薪年休假
    pattern: (无|没有|不|未).{0,4}(年休假|带薪休假|年假)|(取消|抵扣|清零).{0,4}(年休假|年假)
    level: 中
    law_ref: 职工带薪年休假条例第5条
    suggestion: 工作满一年享有 5-15 天年休假；确因工作需要不能安排的，经职工同意可不安排，但应支付 300% 工资。

  - id: LAB-011
    title: 违法解除孕期/产期/哺乳期女职工
    pattern: (孕期|产期|哺乳期|产假|怀孕).{0,12}(解除|辞退|开除|终止|降薪|调岗)
    level: 高
    law_ref: 劳动合同法第42条、妇女权益保障法第48条
    suggestion: 女职工在「三期」内，用人单位不得依第40条、41条解除合同；违规解除属违法解除，应支付二倍经济补偿。

  - id: LAB-012
    title: 竞业限制未约定经济补偿
    pattern: 竞业(限制|禁止).{0,20}(未|不|没有|无).{0,4}(约定|支付|给).{0,4}(补偿|经济补偿|补偿金)
    level: 中
    law_ref: 劳动合同法第23条、最高院劳动争议司法解释（四）第6条
    suggestion: 竞业限制须按月给予经济补偿，未约定补偿标准时按解除前十二个月平均工资 30% 计算（不低于最低工资）。

  - id: LAB-013
    title: 末位淘汰/绩效淘汰直接解除违法
    pattern: (末位淘汰|排名末位|绩效.{0,4}末位|末位.{0,4}解除|末位.{0,4}辞退)
    level: 高
    law_ref: 劳动合同法第39条、第40条；最高院指导案例18号
    suggestion: 「末位淘汰」不等于「不能胜任工作」；即便考核末位也须经培训或调岗后仍不胜任方可解除，并支付经济补偿。

  - id: LAB-014
    title: 自愿放弃社保条款无效
    pattern: (自愿|主动|书面).{0,4}(放弃|不缴|不要求).{0,4}(社保|社会保险|工伤保险|养老保险)
    level: 高
    law_ref: 社会保险法第58条、劳动合同法第26条
    suggestion: 缴纳社保是法定义务，劳资双方任何「自愿放弃社保」的约定均属无效，职工仍可主张补缴及经济补偿。

  - id: LAB-015
    title: 月加班时间超过法定上限（36小时）
    pattern: 加班.{0,12}(每月|单月|月.{0,4}合计).{0,4}(超过|大于|多于).{0,4}(36|三十六|40|四十).{0,2}小时|996|007(?!\\d)
    level: 中
    law_ref: 劳动法第41条、第43条
    suggestion: 一般每日加班不超过 1 小时（特殊原因不超过 3 小时），每月合计不超过 36 小时；超时加班即使支付加班费亦违法。
