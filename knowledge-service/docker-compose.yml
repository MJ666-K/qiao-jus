services:
  knowledge-service:
    build: .
    container_name: knowledge-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./data/uploads:/app/data/uploads
    networks:
      - ks-net

  worker:
    build: .
    container_name: knowledge-worker
    restart: unless-stopped
    command: celery -A pipeline.celery_app worker -Q ingest,graph --concurrency=2 --loglevel=INFO
    env_file: .env
    depends_on:
      - knowledge-service
      - redis
    volumes:
      - ./data/uploads:/app/data/uploads
    networks:
      - ks-net

  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: knowledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ks
      POSTGRES_PASSWORD: ks_secret
      POSTGRES_DB: knowledge
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ks -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - ks-net

  qdrant:
    image: docker.m.daocloud.io/qdrant/qdrant:v1.12.4
    container_name: knowledge-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snap:/qdrant/snapshots
    networks:
      - ks-net

  neo4j:
    image: docker.m.daocloud.io/library/neo4j:5.23-community
    container_name: knowledge-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - ks-net

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: knowledge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ks-net

volumes:
  pg_data:
  qdrant_data:
  qdrant_snap:
  neo4j_data:
  redis_data:

networks:
  ks-net:
    driver: bridge
