<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Service</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; }
  .view { display: none; }
  .view.active { display: block; }
  .nav-item.active { background: #1e40af; color: white; }
  .badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .badge-parsing { background: #dbeafe; color: #1e40af; }
  .badge-chunking { background: #dbeafe; color: #1e40af; }
  .badge-embedding { background: #e0e7ff; color: #3730a3; }
  .badge-graphing { background: #ede9fe; color: #5b21b6; }
  .badge-done { background: #d1fae5; color: #065f46; }
  .badge-failed { background: #fee2e2; color: #991b1b; }
  pre { white-space: pre-wrap; word-wrap: break-word; }
  .drop-zone.dragover { background: #dbeafe; border-color: #2563eb; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- Login View -->
<div id="loginView" class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold mb-1">Knowledge Service</h1>
    <p class="text-sm text-slate-500 mb-6">知识库 + 图谱底座</p>
    <div class="space-y-3">
      <input id="loginEmail" type="email" placeholder="邮箱" class="w-full px-3 py-2 border rounded-lg" value="test@demo.com">
      <input id="loginPassword" type="password" placeholder="密码" class="w-full px-3 py-2 border rounded-lg" value="test12345">
      <div class="flex gap-2">
        <button onclick="doLogin()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">登录</button>
        <button onclick="doRegister()" class="flex-1 bg-slate-200 py-2 rounded-lg hover:bg-slate-300">注册</button>
      </div>
      <div id="loginError" class="text-red-600 text-sm hidden"></div>
    </div>
  </div>
</div>

<!-- App View -->
<div id="appView" class="hidden">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-56 bg-slate-900 text-white p-4 flex flex-col">
      <div class="mb-6">
        <div class="text-lg font-bold">📚 Knowledge</div>
        <div class="text-xs text-slate-400" id="tenantLabel"></div>
      </div>
      <nav class="flex-1 space-y-1">
        <a href="#" onclick="switchView('dashboard'); return false;" class="nav-item block px-3 py-2 rounded hover:bg-slate-700" data-view="dashboard">📊 Dashboard</a>
        <a href="#" onclick="switchView('datasets'); return false;" class="nav-item block px-3 py-2 rounded hover:bg-slate-700" data-view="datasets">📁 数据集</a>
        <a href="#" onclick="switchView('documents'); return false;" class="nav-item block px-3 py-2 rounded hover:bg-slate-700" data-view="documents">📄 文档</a>
        <a href="#" onclick="switchView('search'); return false;" class="nav-item block px-3 py-2 rounded hover:bg-slate-700" data-view="search">🔍 检索</a>
        <a href="#" onclick="switchView('graph'); return false;" class="nav-item block px-3 py-2 rounded hover:bg-slate-700" data-view="graph">🕸️ 图谱</a>
        <a href="#" onclick="switchView('answer'); return false;" class="nav-item block px-3 py-2 rounded hover:bg-slate-700" data-view="answer">💬 问答</a>
      </nav>
      <div class="text-xs text-slate-400 border-t border-slate-700 pt-3">
        <div id="userEmail"></div>
        <button onclick="logout()" class="mt-2 text-red-400 hover:text-red-300">退出</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 overflow-x-hidden">

      <!-- Dashboard -->
      <section id="view-dashboard" class="view">
        <h2 class="text-xl font-bold mb-4">Dashboard</h2>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6" id="statCards"></div>
        <div class="bg-white rounded-lg shadow p-4">
          <h3 class="font-semibold mb-3">流水线状态分布</h3>
          <div id="jobBreakdown" class="space-y-2 text-sm"></div>
        </div>
      </section>

      <!-- Datasets -->
      <section id="view-datasets" class="view">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">数据集</h2>
          <button onclick="showCreateDataset()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-blue-700">+ 新建</button>
        </div>
        <div id="datasetsList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        <div id="datasetModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
          <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="font-bold mb-3">新建数据集</h3>
            <input id="dsName" placeholder="名称" class="w-full px-3 py-2 border rounded mb-2">
            <textarea id="dsDesc" placeholder="描述（可选）" class="w-full px-3 py-2 border rounded mb-3" rows="2"></textarea>
            <div class="flex gap-2 justify-end">
              <button onclick="hideCreateDataset()" class="px-3 py-1.5 bg-slate-200 rounded">取消</button>
              <button onclick="createDataset()" class="px-3 py-1.5 bg-blue-600 text-white rounded">创建</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Documents -->
      <section id="view-documents" class="view">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">文档管理</h2>
          <select id="docDatasetFilter" onchange="loadDocuments()" class="border px-2 py-1.5 rounded text-sm">
            <option value="">所有数据集</option>
          </select>
        </div>

        <div id="dropZone" class="drop-zone border-2 border-dashed border-slate-300 rounded-lg p-8 text-center mb-4 cursor-pointer hover:bg-slate-50">
          <p class="text-slate-600 mb-2">📎 拖拽文件到这里上传，或</p>
          <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this.files[0])">
          <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">选择文件</button>
          <p class="text-xs text-slate-400 mt-2">支持 .md / .txt / .pdf / .docx / .html</p>
        </div>

        <div id="documentsList" class="bg-white rounded-lg shadow divide-y"></div>
      </section>

      <!-- Search -->
      <section id="view-search" class="view">
        <h2 class="text-xl font-bold mb-4">Hybrid 检索</h2>
        <div class="flex gap-2 mb-4">
          <input id="searchQuery" placeholder="输入查询..." class="flex-1 px-3 py-2 border rounded-lg" onkeydown="if(event.key==='Enter')doSearch()">
          <input id="searchTopK" type="number" value="10" min="1" max="50" class="w-20 px-2 py-2 border rounded-lg" title="top K">
          <button onclick="doSearch()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">搜索</button>
        </div>
        <div id="searchResults" class="space-y-3"></div>
      </section>

      <!-- Graph -->
      <section id="view-graph" class="view">
        <h2 class="text-xl font-bold mb-4">知识图谱</h2>
        <div class="flex gap-2 mb-4 flex-wrap">
          <button onclick="loadGraphLocal()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-sm">局部遍历</button>
          <button onclick="loadCommunities()" class="bg-purple-600 text-white px-3 py-1.5 rounded text-sm">查看社区</button>
          <button onclick="rebuildCommunities()" class="bg-amber-600 text-white px-3 py-1.5 rounded text-sm">重建社区</button>
          <input id="graphQuery" placeholder="实体名/查询..." class="flex-1 min-w-[200px] px-3 py-1.5 border rounded text-sm" value="智芯科技 NeuroScale 阿里云">
          <input id="graphDepth" type="number" value="2" min="1" max="3" class="w-16 px-2 py-1.5 border rounded text-sm" title="depth">
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="col-span-2 bg-white rounded-lg shadow p-4">
            <svg id="graphSvg" width="100%" height="500" class="bg-slate-50 rounded"></svg>
          </div>
          <div id="graphSidebar" class="bg-white rounded-lg shadow p-4 text-sm overflow-y-auto" style="max-height:540px"></div>
        </div>
        <div id="communitiesPanel" class="hidden mt-4 bg-white rounded-lg shadow p-4">
          <h3 class="font-semibold mb-3">社区列表</h3>
          <div id="communitiesList" class="space-y-2 text-sm"></div>
        </div>
      </section>

      <!-- Answer -->
      <section id="view-answer" class="view">
        <h2 class="text-xl font-bold mb-4">一站式问答</h2>
        <div class="flex gap-2 mb-2">
          <input id="answerQuery" placeholder="问题..." class="flex-1 px-3 py-2 border rounded-lg" onkeydown="if(event.key==='Enter')doAnswer()">
          <label class="flex items-center gap-1 text-sm"><input id="answerUseGraph" type="checkbox" checked> 图谱</label>
          <button onclick="doAnswer()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">问答</button>
        </div>
        <div class="flex gap-2 mb-4 text-xs">
          <button onclick="doGlobalAnswer()" class="bg-purple-600 text-white px-2 py-1 rounded">🌐 全局图谱问答（GraphRAG）</button>
          <span class="text-slate-500 self-center">全局问答适合跨文档宏观问题</span>
        </div>
        <div id="answerResult" class="space-y-3"></div>
      </section>

    </main>
  </div>
</div>

<script>
const API = '';
let TOKEN = localStorage.getItem('ks_token') || '';
let USER = JSON.parse(localStorage.getItem('ks_user') || 'null');

// ============ Auth ============
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 204) return null;
  const text = await res.text();
  if (!text) return null;
  const data = JSON.parse(text);
  if (!res.ok) throw new Error(data.detail || text);
  return data;
}

async function doLogin() {
  try {
    const email = document.getElementById('loginEmail').value;
    const pwd = document.getElementById('loginPassword').value;
    const r = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pwd})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || '登录失败');
    TOKEN = d.access_token;
    localStorage.setItem('ks_token', TOKEN);
    await fetchMe();
    enterApp();
  } catch (e) {
    document.getElementById('loginError').textContent = e.message;
    document.getElementById('loginError').classList.remove('hidden');
  }
}

async function doRegister() {
  try {
    const email = document.getElementById('loginEmail').value;
    const pwd = document.getElementById('loginPassword').value;
    const r = await fetch(API + '/auth/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pwd, tenant_name: email.split('@')[0]})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || '注册失败');
    TOKEN = d.access_token;
    localStorage.setItem('ks_token', TOKEN);
    await fetchMe();
    enterApp();
  } catch (e) {
    document.getElementById('loginError').textContent = e.message;
    document.getElementById('loginError').classList.remove('hidden');
  }
}

async function fetchMe() {
  USER = await api('/auth/me');
  localStorage.setItem('ks_user', JSON.stringify(USER));
}

function logout() {
  TOKEN = '';
  USER = null;
  localStorage.removeItem('ks_token');
  localStorage.removeItem('ks_user');
  location.reload();
}

function enterApp() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  document.getElementById('userEmail').textContent = USER.email;
  document.getElementById('tenantLabel').textContent = '租户 ' + USER.tenant_id.slice(0,8);
  switchView('dashboard');
}

// ============ Navigation ============
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-view="${view}"]`)?.classList.add('active');
  if (view === 'dashboard') loadDashboard();
  if (view === 'datasets') loadDatasets();
  if (view === 'documents') { loadDatasetsDropdown(); loadDocuments(); }
  if (view === 'graph') document.getElementById('communitiesPanel').classList.add('hidden');
}

// ============ Dashboard ============
async function loadDashboard() {
  try {
    const s = await api('/stats');
    const cards = [
      { label: '数据集', value: s.datasets, color: 'bg-blue-500' },
      { label: '文档', value: s.documents, color: 'bg-indigo-500' },
      { label: '已处理', value: s.documents_done, color: 'bg-green-500' },
      { label: '文本块', value: s.chunks, color: 'bg-purple-500' },
      { label: '向量数', value: s.qdrant_points, color: 'bg-pink-500' },
    ];
    document.getElementById('statCards').innerHTML = cards.map(c => `
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-xs text-slate-500">${c.label}</div>
        <div class="text-2xl font-bold ${c.color.replace('bg-', 'text-')}">${c.value}</div>
      </div>
    `).join('');

    const breakdown = s.job_breakdown || [];
    if (!breakdown.length) {
      document.getElementById('jobBreakdown').innerHTML = '<div class="text-slate-400">暂无任务记录</div>';
    } else {
      document.getElementById('jobBreakdown').innerHTML = breakdown.map(j => `
        <div class="flex justify-between py-1 border-b last:border-0">
          <span>${j.stage} / ${j.status}</span>
          <span class="font-semibold">${j.count}</span>
        </div>
      `).join('');
    }
  } catch (e) { console.error(e); }
}

// ============ Datasets ============
async function loadDatasets() {
  try {
    const list = await api('/datasets');
    const el = document.getElementById('datasetsList');
    if (!list.length) {
      el.innerHTML = '<div class="col-span-3 text-center text-slate-400 py-8">暂无数据集</div>';
      return;
    }
    el.innerHTML = list.map(d => `
      <div class="bg-white rounded-lg shadow p-4">
        <div class="font-semibold mb-1">${escapeHtml(d.name)}</div>
        <div class="text-xs text-slate-500 mb-2">${escapeHtml(d.description || '')}</div>
        <div class="text-xs text-slate-400">${d.id.slice(0,8)}</div>
      </div>
    `).join('');
  } catch (e) { console.error(e); }
}

function showCreateDataset() { document.getElementById('datasetModal').classList.remove('hidden'); }
function hideCreateDataset() { document.getElementById('datasetModal').classList.add('hidden'); }

async function createDataset() {
  try {
    await api('/datasets', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('dsName').value,
        description: document.getElementById('dsDesc').value || null,
      })
    });
    hideCreateDataset();
    document.getElementById('dsName').value = '';
    document.getElementById('dsDesc').value = '';
    loadDatasets();
  } catch (e) { alert(e.message); }
}

async function loadDatasetsDropdown() {
  try {
    const list = await api('/datasets');
    const sel = document.getElementById('docDatasetFilter');
    const cur = sel.value;
    sel.innerHTML = '<option value="">所有数据集</option>' + list.map(d => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('');
    sel.value = cur;
  } catch (e) { console.error(e); }
}

// ============ Documents ============
async function loadDocuments() {
  try {
    const dsFilter = document.getElementById('docDatasetFilter').value;
    const url = '/documents' + (dsFilter ? `?dataset_id=${dsFilter}` : '');
    const list = await api(url);
    const el = document.getElementById('documentsList');
    if (!list.length) {
      el.innerHTML = '<div class="p-6 text-center text-slate-400">暂无文档，请上传</div>';
      return;
    }
    el.innerHTML = list.map(d => `
      <div class="p-4 flex items-center justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="font-medium truncate">${escapeHtml(d.title)}</span>
            <span class="badge badge-${d.status}">${d.status}</span>
            ${d.error ? `<span class="text-xs text-red-600" title="${escapeHtml(d.error)}">⚠</span>` : ''}
          </div>
          <div class="text-xs text-slate-500">
            ${d.id.slice(0,8)} · ${(d.mime_type||'').split(';')[0] || '?'} · ${new Date(d.created_at).toLocaleString('zh-CN')}
          </div>
        </div>
        <div class="flex gap-1 shrink-0">
          <button onclick="pollDoc('${d.id}')" class="text-xs px-2 py-1 bg-slate-100 rounded hover:bg-slate-200" title="查看状态">查看</button>
          <button onclick="reindexDoc('${d.id}')" class="text-xs px-2 py-1 bg-amber-100 text-amber-700 rounded hover:bg-amber-200" title="重新索引">↻</button>
          <button onclick="deleteDoc('${d.id}')" class="text-xs px-2 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200" title="删除">✕</button>
        </div>
      </div>
    `).join('');
  } catch (e) { console.error(e); }
}

async function pollDoc(id) {
  try {
    const d = await api('/documents/' + id);
    alert(`文档：${d.title}\n状态：${d.status}${d.error ? '\n错误：'+d.error : ''}`);
    loadDocuments();
  } catch (e) { alert(e.message); }
}

async function reindexDoc(id) {
  if (!confirm('重新索引会清空并重建该文档的所有 chunks/向量/图谱，确认？')) return;
  try {
    const r = await api('/documents/' + id + '/reindex', { method: 'POST' });
    alert('✅ 已触发重新索引：' + r.status);
    loadDocuments();
  } catch (e) { alert(e.message); }
}

async function deleteDoc(id) {
  if (!confirm('删除文档及其所有 chunks/向量/图谱，确认？')) return;
  try {
    await api('/documents/' + id, { method: 'DELETE' });
    loadDocuments();
  } catch (e) { alert(e.message); }
}

async function uploadFile(file) {
  if (!file) return;
  const ds = document.getElementById('docDatasetFilter').value;
  if (!ds) { alert('请先选择一个数据集'); return; }
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch(`${API}/documents/upload?dataset_id=${ds}`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN },
      body: fd
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || '上传失败');
    alert('✅ 已上传，文档ID: ' + d.id.slice(0,8) + '，状态：' + d.status);
  } catch (e) { alert(e.message); }
}

// Drag-drop
const dz = document.getElementById('dropZone');
['dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); }));
dz.addEventListener('drop', e => { e.preventDefault(); uploadFile(e.dataTransfer.files[0]); });

// ============ Search ============
async function doSearch() {
  const q = document.getElementById('searchQuery').value.trim();
  if (!q) return;
  const topK = parseInt(document.getElementById('searchTopK').value) || 10;
  document.getElementById('searchResults').innerHTML = '<div class="text-slate-500">搜索中...</div>';
  try {
    const r = await api('/search', {
      method: 'POST',
      body: JSON.stringify({query: q, top_k: topK})
    });
    const el = document.getElementById('searchResults');
    if (!r.hits.length) {
      el.innerHTML = '<div class="text-slate-500">无匹配结果</div>';
      return;
    }
    el.innerHTML = r.hits.map((h, i) => `
      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between mb-2">
          <span class="text-xs text-slate-500">#${i+1} 来自: ${escapeHtml(h.source || '?')} · score=${h.score.toFixed(4)}</span>
        </div>
        <pre class="text-sm">${escapeHtml(h.text)}</pre>
      </div>
    `).join('');
    if (r.graph_context && r.graph_context.length) {
      el.innerHTML += `
        <div class="bg-purple-50 rounded-lg p-4 text-sm">
          <div class="font-semibold mb-2">🧠 图谱关联实体（${r.graph_context.length}）：</div>
          <div class="flex flex-wrap gap-2">
            ${r.graph_context.slice(0,12).map(g => `<span class="px-2 py-1 bg-white rounded border text-xs">${escapeHtml(g.name||'')} <span class="text-slate-400">(${escapeHtml(g.type||'')})</span></span>`).join('')}
          </div>
        </div>
      `;
    }
  } catch (e) { document.getElementById('searchResults').innerHTML = '<div class="text-red-600">Error: ' + e.message + '</div>'; }
}

// ============ Graph ============
async function loadGraphLocal() {
  const q = document.getElementById('graphQuery').value.trim();
  const depth = parseInt(document.getElementById('graphDepth').value) || 2;
  if (!q) return;
  document.getElementById('graphSidebar').innerHTML = '<div class="text-slate-500">查询中...</div>';
  try {
    const r = await api('/graph/local', {
      method: 'POST',
      body: JSON.stringify({query: q, depth})
    });
    renderGraph(r.entities || [], r.relations || []);
    const side = document.getElementById('graphSidebar');
    if (!r.entities.length) {
      side.innerHTML = '<div class="text-slate-500">无实体匹配</div>';
      return;
    }
    side.innerHTML = `
      <div class="font-semibold mb-2">实体（${r.entities.length}）</div>
      <div class="space-y-1 max-h-96 overflow-y-auto">
        ${(r.entities||[]).map(e => `
          <div class="border-b pb-1">
            <div class="font-medium">${escapeHtml(e.name)}</div>
            <div class="text-xs text-slate-500">${escapeHtml(e.type||'')} ${e.description ? '· ' + escapeHtml(e.description.slice(0,80)) : ''}</div>
          </div>
        `).join('')}
      </div>
      ${r.related_chunks && r.related_chunks.length ? `<div class="mt-3 text-xs"><div class="font-semibold">关联 chunks: ${r.related_chunks.length}</div></div>` : ''}
    `;
  } catch (e) { document.getElementById('graphSidebar').innerHTML = '<div class="text-red-600">Error: '+e.message+'</div>'; }
}

function renderGraph(entities, relations) {
  const svg = d3.select('#graphSvg');
  svg.selectAll('*').remove();
  if (!entities.length) return;
  const width = document.getElementById('graphSvg').clientWidth;
  const height = 500;
  const nodes = entities.map(e => ({id: e.id || e.name, name: e.name, type: e.type || ''}));
  const color = d3.scaleOrdinal(d3.schemeCategory10);
  const sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide(40));
  const link = svg.append('g').selectAll('line').data(relations).enter().append('line')
    .attr('stroke', '#999').attr('stroke-opacity', 0.6);
  const node = svg.append('g').selectAll('circle').data(nodes).enter().append('g').call(d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e,d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e,d) => { d.fx = null; d.fy = null; }));
  node.append('circle').attr('r', 8).attr('fill', d => color(d.type));
  node.append('text').text(d => d.name).attr('dx', 12).attr('dy', 4).attr('font-size', '11px');
  sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

async function loadCommunities() {
  try {
    const r = await api('/graph/communities');
    document.getElementById('communitiesPanel').classList.remove('hidden');
    const el = document.getElementById('communitiesList');
    if (!r.length) {
      el.innerHTML = '<div class="text-slate-500">暂无社区，请先点"重建社区"</div>';
      return;
    }
    el.innerHTML = r.map(c => `
      <div class="border rounded p-3">
        <div class="font-semibold">${escapeHtml(c.title || '(无标题)')}</div>
        <div class="text-xs text-slate-500 mb-1">level ${c.level} · ${c.id.slice(0,8)}</div>
        <div class="text-sm">${escapeHtml(c.summary || '')}</div>
      </div>
    `).join('');
  } catch (e) { alert(e.message); }
}

async function rebuildCommunities() {
  try {
    document.getElementById('graphSidebar').innerHTML = '<div class="text-slate-500">重建社区中（可能需 10-30 秒）...</div>';
    const r = await api('/graph/rebuild', { method: 'POST' });
    alert(`✅ 重建完成：${r.communities} 个社区，覆盖 ${r.entities_covered} 个实体`);
    loadCommunities();
  } catch (e) { alert(e.message); }
}

// ============ Answer ============
async function doAnswer() {
  const q = document.getElementById('answerQuery').value.trim();
  if (!q) return;
  const useGraph = document.getElementById('answerUseGraph').checked;
  document.getElementById('answerResult').innerHTML = '<div class="text-slate-500">生成中...</div>';
  try {
    const r = await api('/search/answer', {
      method: 'POST',
      body: JSON.stringify({query: q, use_graph: useGraph})
    });
    document.getElementById('answerResult').innerHTML = `
      <div class="bg-white rounded-lg shadow p-4">
        <div class="text-xs text-slate-500 mb-2">💬 答案（${r.sources?.length || 0} 个来源，${r.graph_entities?.length || 0} 个图谱实体）</div>
        <pre class="text-sm leading-relaxed">${escapeHtml(r.answer)}</pre>
      </div>
      ${r.sources && r.sources.length ? `
        <details class="bg-white rounded-lg shadow p-4">
          <summary class="cursor-pointer font-semibold text-sm">📚 来源 (${r.sources.length})</summary>
          <div class="mt-3 space-y-2">
            ${r.sources.map((s,i) => `<div class="border-l-2 pl-2 text-xs"><div class="font-medium">#${i+1} ${escapeHtml(s.source||'')} (score ${s.score.toFixed(3)})</div><pre>${escapeHtml(s.text.slice(0,200))}...</pre></div>`).join('')}
          </div>
        </details>
      ` : ''}
    `;
  } catch (e) { document.getElementById('answerResult').innerHTML = '<div class="text-red-600">Error: '+e.message+'</div>'; }
}

async function doGlobalAnswer() {
  const q = document.getElementById('answerQuery').value.trim();
  if (!q) return;
  document.getElementById('answerResult').innerHTML = '<div class="text-slate-500">🌐 GraphRAG 全局问答中（map-reduce，约 15-60 秒）...</div>';
  try {
    const r = await api('/graph/global', {
      method: 'POST',
      body: JSON.stringify({query: q, depth: 2})
    });
    document.getElementById('answerResult').innerHTML = `
      <div class="bg-purple-50 border-l-4 border-purple-500 rounded-lg p-4">
        <div class="text-xs text-purple-700 mb-2">🌐 GraphRAG 全局答案（基于 ${r.communities_used || 0} 个社区）</div>
        <pre class="text-sm leading-relaxed">${escapeHtml(r.answer)}</pre>
      </div>
      ${r.community_refs && r.community_refs.length ? `
        <details class="bg-white rounded-lg shadow p-4">
          <summary class="cursor-pointer font-semibold text-sm">📦 引用社区 (${r.community_refs.length})</summary>
          <div class="mt-3 space-y-2">
            ${r.community_refs.map((c,i) => `<div class="border-l-2 pl-2 text-xs"><div class="font-medium">${escapeHtml(c.title||'')}</div><pre>${escapeHtml(c.partial_excerpt||'')}</pre></div>`).join('')}
          </div>
        </details>
      ` : ''}
    `;
  } catch (e) { document.getElementById('answerResult').innerHTML = '<div class="text-red-600">Error: '+e.message+'</div>'; }
}

// ============ Utils ============
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ Init ============
if (TOKEN) {
  fetchMe().then(enterApp).catch(() => {
    TOKEN = '';
    localStorage.removeItem('ks_token');
  });
}
