name: fengqiao

x-app-env: &app-env
  APP_ENV: production
  DATABASE_URL: postgresql+asyncpg://fengqiao:fengqiao123@postgres:5432/fengqiao
  QDRANT_URL: http://qdrant:6333
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: fengqiao123
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2

services:
  postgres:
    image: postgres:16-alpine
    container_name: fengqiao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fengqiao
      POSTGRES_USER: fengqiao
      POSTGRES_PASSWORD: fengqiao123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fengqiao -d fengqiao"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fengqiao-net

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: fengqiao-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - fengqiao-net

  neo4j:
    image: neo4j:5.21-community
    container_name: fengqiao-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/fengqiao123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - fengqiao-net

  redis:
    image: redis:7-alpine
    container_name: fengqiao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - fengqiao-net

  api:
    image: fengqiao-api:latest
    container_name: fengqiao-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      qdrant:   { condition: service_healthy }
      neo4j:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment: *app-env
    env_file:
      - ../knowledge-service/.env
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
    networks:
      - fengqiao-net

  worker:
    image: fengqiao-api:latest
    container_name: fengqiao-worker
    restart: unless-stopped
    command: celery -A pipeline.celery_app worker -Q ingest,graph --concurrency=2 --loglevel=INFO
    depends_on:
      postgres: { condition: service_healthy }
      qdrant:   { condition: service_healthy }
      neo4j:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment: *app-env
    env_file:
      - ../knowledge-service/.env
    volumes:
      - ./data/uploads:/app/data/uploads
    networks:
      - fengqiao-net

  nginx:
    image: nginx:alpine
    container_name: fengqiao-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - fengqiao-net

networks:
  fengqiao-net:
    driver: bridge
