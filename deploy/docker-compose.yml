name: fengqiao

# 容器间通信用 compose 服务名 + 容器内部端口，见 deploy/.env
# 对外仅暴露 nginx :80；调试时可取消注释各服务 ports

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fengqiao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fengqiao
      POSTGRES_USER: fengqiao
      POSTGRES_PASSWORD: fengqiao123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fengqiao -d fengqiao"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - fengqiao-net

  qdrant:
    image: docker.m.daocloud.io/qdrant/qdrant:v1.12.4
    container_name: fengqiao-qdrant
    restart: unless-stopped
    # ports:
    #   - "6333:6333"
    #   - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fengqiao-net

  neo4j:
    image: neo4j:5.21-community
    container_name: fengqiao-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/fengqiao123
      NEO4J_PLUGINS: '["apoc"]'
    # ports:
    #   - "7474:7474"
    #   - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "fengqiao123", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - fengqiao-net

  redis:
    image: redis:7-alpine
    container_name: fengqiao-redis
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - fengqiao-net

  api:
    image: fengqiao-api:latest
    container_name: fengqiao-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      qdrant:   { condition: service_healthy }
      neo4j:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file:
      - ./.env
    # ports:
    #   - "8000:8000"
    networks:
      - fengqiao-net

  worker:
    image: fengqiao-api:latest
    container_name: fengqiao-worker
    restart: unless-stopped
    command: celery -A pipeline.celery_app worker -Q ingest,graph --concurrency=2 --loglevel=INFO
    depends_on:
      postgres: { condition: service_healthy }
      qdrant:   { condition: service_healthy }
      neo4j:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file:
      - ./.env
    networks:
      - fengqiao-net

  nginx:
    image: nginx:alpine
    container_name: fengqiao-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - fengqiao-net

networks:
  fengqiao-net:
    driver: bridge
